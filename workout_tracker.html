<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#09090f">
<link rel="manifest" href="./manifest.webmanifest">
<title>Hybrid Warrior</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{--bg:#09090f;--surface:#111118;--card:#16161f;--card-hover:#1c1c28;--border:#2a2a38;--border-lit:#3d3d55;--text:#f0f0f5;--text2:#9898a8;--text3:#5e5e70;--fire:#ff6b35;--ice:#00c8ff;--mint:#00e676;--gold:#ffd740;--red:#ff5252;--radius:14px;--radius-sm:10px}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

.nav{position:sticky;top:0;z-index:100;background:rgba(9,9,15,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 20px}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:6px;height:56px;overflow-x:auto}
.logo{font-weight:900;font-size:17px;background:linear-gradient(135deg,var(--fire),var(--ice));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;margin-right:10px;flex-shrink:0}
.nav-btn{background:none;border:none;color:var(--text2);font:600 12px/1 'Inter',sans-serif;padding:7px 12px;border-radius:99px;cursor:pointer;white-space:nowrap;transition:.2s}
.nav-btn:hover{color:var(--text);background:var(--card)}.nav-btn.active{color:var(--fire);background:rgba(255,107,53,.12)}
.nav-pill{margin-left:auto;font-size:10px;font-weight:600;color:var(--text3);white-space:nowrap;border:1px solid var(--border);border-radius:99px;padding:4px 10px;flex-shrink:0}

.page{max-width:1200px;margin:0 auto;padding:16px 20px 40px}
.pane{display:none;animation:fadeUp .25s ease}.pane.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.section{margin-bottom:16px}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:border-color .2s}
.card:hover{border-color:var(--border-lit)}
.card-h{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.card-h h2{font-size:15px;font-weight:700}
.badge{font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 8px;border-radius:99px}
.badge-fire{background:rgba(255,107,53,.15);color:var(--fire)}.badge-ice{background:rgba(0,200,255,.15);color:var(--ice)}
.badge-mint{background:rgba(0,230,118,.15);color:var(--mint)}.badge-gold{background:rgba(255,215,64,.15);color:var(--gold)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.stack{display:flex;flex-direction:column;gap:12px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

.gauge{position:relative;width:100px;height:100px;flex-shrink:0}
.gauge svg{transform:rotate(-90deg)}.gauge-bg{fill:none;stroke:var(--border);stroke-width:7}
.gauge-fill{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.gauge-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.gauge-val{font-size:20px;font-weight:900;line-height:1}.gauge-sub{font-size:9px;color:var(--text2);margin-top:1px}

input,select,textarea{width:100%;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;font:500 13px/1.4 'Inter',sans-serif;transition:border-color .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ice)}
textarea{min-height:70px;resize:vertical}
label{display:block;font-size:10px;font-weight:600;color:var(--text2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.input-sm{padding:7px 9px;font-size:12px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--radius-sm);font:700 12px/1 'Inter',sans-serif;padding:10px 16px;cursor:pointer;transition:.15s;color:#fff}
.btn-fire{background:linear-gradient(135deg,var(--fire),#e85520)}.btn-fire:hover{filter:brightness(1.12)}
.btn-ice{background:linear-gradient(135deg,var(--ice),#0080cc)}.btn-ice:hover{filter:brightness(1.12)}
.btn-mint{background:linear-gradient(135deg,var(--mint),#00b860)}.btn-mint:hover{filter:brightness(1.12)}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--text2)}.btn-ghost:hover{border-color:var(--border-lit);color:var(--text)}
.btn-sm{padding:6px 10px;font-size:11px}.btn-block{width:100%}

.ex-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
.ex-card:hover{border-color:var(--border-lit)}.ex-card.logged{border-color:var(--mint)}
.ex-top{display:flex;align-items:center;gap:12px;padding:14px 18px}
.ex-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0;background:linear-gradient(135deg,var(--fire),var(--ice));color:#000}
.ex-info{flex:1;min-width:0}.ex-name{font-size:14px;font-weight:700}.ex-rx{font-size:12px;color:var(--text2);margin-top:2px}
.ex-reason{font-size:10px;color:var(--text3);margin-top:2px;font-style:italic}.ex-rest{font-size:10px;color:var(--text3);margin-top:3px}
.ex-actions{display:flex;gap:5px;flex-shrink:0}
.ex-body{display:none;padding:0 18px 14px;border-top:1px solid var(--border)}.ex-body.open{display:block;padding-top:12px}
.ex-log-grid{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:10px}
.ex-howto{background:var(--surface);border-radius:var(--radius-sm);padding:10px;margin-top:10px}
.ex-howto ol{margin-left:16px;color:var(--text2);font-size:12px}.ex-howto ol li{margin-bottom:3px}
.ex-pdf-area{margin-top:10px}.ex-pdf-area canvas{width:100%;border-radius:8px;border:1px solid var(--border)}
.ex-video{margin-top:10px}
.ex-video iframe{width:100%;aspect-ratio:16/9;border:1px solid var(--border);border-radius:8px;background:#000}
.ex-video .fallback{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-top:6px}
.ex-video .fallback a{font-size:11px;color:var(--ice);text-decoration:underline}
.fig-wrap{margin-top:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px}
.fig-title{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.fig-legend{display:flex;gap:12px;font-size:10px;color:var(--text3);margin-top:6px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
.finisher{background:linear-gradient(135deg,rgba(255,107,53,.07),rgba(0,200,255,.05));border:1px solid rgba(255,107,53,.2);border-radius:var(--radius);padding:16px;margin-top:12px}
.finisher h3{color:var(--fire);font-size:13px;margin-bottom:4px}.finisher p{font-size:12px;color:var(--text2)}

table{width:100%;border-collapse:collapse}
th,td{padding:8px 10px;text-align:left;font-size:12px;border-bottom:1px solid var(--border)}
th{color:var(--text3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px}td{color:var(--text2)}

.streak-bar{display:flex;gap:4px;margin-top:6px}
.streak-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:2px solid var(--border);color:var(--text3)}
.streak-dot.done{border-color:var(--mint);color:var(--mint);background:rgba(0,230,118,.08)}.streak-dot.today{border-color:var(--fire);color:var(--fire)}

.timeline{display:flex;gap:3px;margin-bottom:16px}
.tl-wk{flex:1;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:.2s}
.tl-wk:hover{filter:brightness(1.2)}.tl-wk.current{border-color:#fff;box-shadow:0 0 12px rgba(255,107,53,.3)}.tl-wk.complete{opacity:.7}
.phase-hyp{background:rgba(0,200,255,.2);color:var(--ice)}.phase-str{background:rgba(255,215,64,.2);color:var(--gold)}
.phase-peak{background:rgba(255,107,53,.2);color:var(--fire)}.phase-test{background:rgba(0,230,118,.2);color:var(--mint)}

.pw-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px}
.pw-card.pw-current{border-color:var(--fire);box-shadow:0 0 20px rgba(255,107,53,.08)}
.pw-head{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background .15s}
.pw-head:hover{background:var(--card-hover)}.pw-head .arrow{color:var(--text3);transition:transform .2s;font-size:12px}.pw-head .arrow.open{transform:rotate(90deg)}
.pw-body{display:none;border-top:1px solid var(--border);padding:14px 16px}.pw-body.open{display:block}
.pw-day{margin-bottom:10px}.pw-day-label{font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.pw-ex-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);padding:2px 0 2px 16px;border-left:2px solid var(--border)}.pw-ex-row b{color:var(--text);font-weight:600}

.log-entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:6px}
.log-entry-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.log-date{font-weight:700;font-size:13px}
.log-score{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px}
.score-good{background:rgba(0,230,118,.12);color:var(--mint)}.score-ok{background:rgba(255,215,64,.12);color:var(--gold)}.score-low{background:rgba(255,82,82,.12);color:var(--red)}
.log-detail{font-size:11px;color:var(--text3)}

.ref-grid{display:grid;grid-template-columns:280px 1fr;gap:14px}
.ref-list{max-height:480px;overflow-y:auto;display:flex;flex-direction:column;gap:5px}
.ref-item{padding:8px 10px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:.2s}
.ref-item:hover,.ref-item.sel{border-color:var(--fire);background:rgba(255,107,53,.04)}.ref-item b{font-size:12px}.ref-item span{font-size:10px;color:var(--text3);display:block;margin-top:1px}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}

.toast{position:fixed;bottom:20px;right:20px;z-index:999;background:var(--card);border:1px solid var(--mint);border-radius:var(--radius);padding:12px 18px;color:var(--mint);font-weight:600;font-size:13px;transform:translateY(80px);opacity:0;transition:.3s;pointer-events:none;max-width:360px}
.toast.show{transform:translateY(0);opacity:1}
.trend-up{color:var(--mint)}.trend-down{color:var(--red)}.trend-flat{color:var(--text3)}

/* AUTH */
.auth-overlay{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;width:100%;max-width:420px;animation:fadeUp .3s ease}
.auth-logo{font-weight:900;font-size:28px;text-align:center;margin-bottom:6px;background:linear-gradient(135deg,var(--fire),var(--ice));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-sub{text-align:center;color:var(--text3);font-size:13px;margin-bottom:24px}
.auth-tabs{display:flex;gap:4px;margin-bottom:16px}
.auth-tab{flex:1;text-align:center;padding:8px;border-radius:var(--radius-sm);font:600 13px/1 'Inter',sans-serif;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:.2s}
.auth-tab.active{background:rgba(255,107,53,.12);border-color:var(--fire);color:var(--fire)}
.auth-err{background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.3);color:var(--red);font-size:12px;padding:8px 12px;border-radius:var(--radius-sm);margin-bottom:12px;display:none}
.auth-err.show{display:block}
.auth-info{background:rgba(0,200,255,.06);border:1px solid rgba(0,200,255,.2);color:var(--ice);font-size:11px;padding:10px;border-radius:var(--radius-sm);margin-bottom:14px;line-height:1.5}
.auth-skip{text-align:center;margin-top:14px}.auth-skip button{background:none;border:none;color:var(--text3);font:500 12px/1 'Inter',sans-serif;cursor:pointer;text-decoration:underline}

/* ONBOARDING */
.ob-overlay{position:fixed;inset:0;z-index:150;background:var(--bg);display:none;overflow-y:auto;padding:20px}
.ob-overlay.show{display:flex;justify-content:center;align-items:flex-start;padding-top:40px}
.ob-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:100%;max-width:600px;animation:fadeUp .3s ease}
.ob-progress{display:flex;gap:4px;margin-bottom:20px}
.ob-dot{flex:1;height:4px;border-radius:99px;background:var(--border)}.ob-dot.done{background:var(--fire)}.ob-dot.active{background:var(--ice)}
.ob-title{font-size:20px;font-weight:900;margin-bottom:4px}.ob-sub{color:var(--text3);font-size:13px;margin-bottom:16px}
.goal-option{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:.2s;margin-bottom:6px}
.goal-option:hover{border-color:var(--border-lit)}.goal-option.selected{border-color:var(--fire);background:rgba(255,107,53,.06)}
.goal-option input[type=checkbox]{accent-color:var(--fire);width:16px;height:16px}
.day-toggle{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;border:2px solid var(--border);cursor:pointer;font-size:11px;font-weight:700;transition:.2s;color:var(--text3)}
.day-toggle.on{border-color:var(--fire);color:var(--fire);background:rgba(255,107,53,.1)}

/* WEIGHT CHART */
.wt-bar{display:flex;align-items:flex-end;gap:2px;height:60px;margin-top:8px}
.wt-col{flex:1;background:var(--border);border-radius:3px 3px 0 0;min-height:2px;transition:height .3s}

@media(max-width:768px){
  .grid2,.grid3{grid-template-columns:1fr}.grid-auto{grid-template-columns:1fr}.ref-grid{grid-template-columns:1fr}
  .nav{position:fixed;top:auto;bottom:0;left:0;right:0;border-top:1px solid var(--border);border-bottom:none;padding:0 env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  .nav-inner{max-width:none;gap:4px;height:64px;padding:0 8px}
  .logo,.nav-pill{display:none}
  .nav-btn{padding:10px 6px;font-size:11px;min-width:0;flex:1;border-radius:10px}
  .nav-btn#nav-so{display:none}
  .page{padding:10px 12px calc(86px + env(safe-area-inset-bottom))}
  .ex-top{flex-wrap:wrap}.ex-log-grid{grid-template-columns:1fr 1fr;gap:6px}
  .timeline{flex-wrap:wrap}.tl-wk{min-width:40px}.auth-card,.ob-card{padding:20px 16px}
  input,select,textarea{font-size:16px}
  .toast{right:10px;left:10px;bottom:calc(80px + env(safe-area-inset-bottom));max-width:none}
}
</style>
</head>
<body>
<div class="auth-overlay" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">HYBRID WARRIOR</div>
    <div class="auth-sub">Secure workout tracking across all your devices</div>
    <div class="auth-err" id="authErr"></div>
    <div id="auth-setup">
      <div class="auth-info"><b>First-time setup:</b> Paste your Firebase config JSON. Get it from <a href="https://console.firebase.google.com" target="_blank" style="color:var(--ice)">Firebase Console</a> → Project Settings → Your apps → Web app config.</div>
      <label>Firebase Config JSON</label>
      <textarea id="auth-cfg" style="min-height:90px;font-size:11px;font-family:monospace" placeholder='{"apiKey":"...","authDomain":"...","projectId":"..."}'></textarea>
      <button class="btn btn-ice btn-block" id="auth-cfg-save" style="margin-top:10px">Save Config & Continue</button>
      <div class="auth-skip"><button id="auth-skip-btn">Use offline only (no sync)</button></div>
    </div>
    <div id="auth-login" style="display:none">
      <div class="auth-tabs"><div class="auth-tab active" data-m="in">Sign In</div><div class="auth-tab" data-m="up">Create Account</div></div>
      <div style="margin-bottom:10px"><label>Email</label><input id="auth-email" type="email" placeholder="you@email.com"></div>
      <div style="margin-bottom:14px"><label>Password</label><input id="auth-pass" type="password" placeholder="Min 6 characters"></div>
      <button class="btn btn-fire btn-block" id="auth-go">Sign In</button>
      <div style="display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--text3);font-size:11px"><span style="flex:1;height:1px;background:var(--border)"></span>or<span style="flex:1;height:1px;background:var(--border)"></span></div>
      <button class="btn btn-ghost btn-block" id="auth-change-cfg" style="font-size:11px">Change Firebase Config</button>
    </div>
    <div id="auth-loading" style="display:none;text-align:center;padding:20px"><div style="color:var(--text3)">Connecting...</div></div>
    </div>
  </div>
<div class="ob-overlay" id="obScreen">
  <div class="ob-card" id="obCard"></div>
</div>
<nav class="nav" style="display:none" id="mainNav"><div class="nav-inner" id="navInner"></div></nav>
<div class="page" id="app" style="display:none"></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
const DAYS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const TABS=[{id:"dash",label:"Dashboard",icon:"◉"},{id:"today",label:"Today",icon:"▶"},{id:"log",label:"Log",icon:"✎"},{id:"program",label:"Program",icon:"☰"},{id:"ref",label:"Reference",icon:"◈"},{id:"settings",label:"Settings",icon:"⚙"}];

const EX=[
  {id:"bench",name:"Barbell Bench Press",tags:["chest","push","upper"],rest:"2-3 min",howTo:["Retract shoulder blades, arch upper back, plant feet.","Lower bar to lower chest, elbows ~45°.","Drive up explosively to lockout."],books:["Copy of OffSeason_2ndEdition_Final.pdf","IN Season workouts.pdf"],kw:["bench","press","chest"]},
  {id:"incline_db",name:"Incline DB Press",tags:["chest","push","upper"],rest:"90s",howTo:["Bench 30-45°, dumbbells at shoulders.","Press up and slightly inward.","Lower with control."],books:["Copy of OffSeason_2ndEdition_Final.pdf"],kw:["incline","dumbbell","chest"]},
  {id:"cgbench",name:"Close-Grip Bench",tags:["triceps","push","upper"],rest:"90s",howTo:["Hands shoulder-width.","Lower to chest, elbows tucked.","Focus on tricep lockout."],books:["Copy of OffSeason_2ndEdition_Final.pdf"],kw:["close","grip","bench"]},
  {id:"ohp",name:"DB Overhead Press",tags:["shoulders","push","upper"],rest:"90s",howTo:["Dumbbells at shoulder height.","Press overhead to full extension.","Lower under control."],books:["Copy of OffSeason_2ndEdition_Final.pdf"],kw:["overhead","press","shoulder"]},
  {id:"squat",name:"Back Squat",tags:["legs","strength","lower"],rest:"2-3 min",howTo:["Bar on upper traps, brace hard.","Sit below parallel.","Drive up through mid-foot."],books:["Copy of OffSeason_2ndEdition_Final.pdf","WrestlingEBook2_FINAL.compressed.pdf"],kw:["squat","legs","barbell"]},
  {id:"deadlift",name:"Conventional Deadlift",tags:["posterior","pull","lower"],rest:"2-3 min",howTo:["Bar over mid-foot, grip outside knees.","Push floor away, chest up.","Lock out hips — don't hyperextend."],books:["Copy of OffSeason_2ndEdition_Final.pdf","IN Season workouts.pdf"],kw:["deadlift","pull","hinge"]},
  {id:"rdl",name:"Romanian Deadlift",tags:["hamstrings","pull","lower"],rest:"90s",howTo:["Hinge at hips, slight knee bend.","Feel hamstring stretch.","Drive hips forward to stand."],books:["Copy of OffSeason_2ndEdition_Final.pdf"],kw:["romanian","deadlift","hamstring"]},
  {id:"row",name:"Barbell Row",tags:["back","pull","upper"],rest:"90s",howTo:["Hinge ~45°, grip wider than shoulders.","Pull to lower ribs, squeeze.","Lower under control."],books:["Copy of OffSeason_2ndEdition_Final.pdf"],kw:["row","back","barbell"]},
  {id:"pullup",name:"Pull-Up",tags:["back","pull","upper"],rest:"90s",howTo:["Dead hang, palms away.","Pull chin over bar.","Lower with full control."],books:["WrestlingEBook2_FINAL.compressed.pdf"],kw:["pull","up","back","lat"]},
  {id:"face_pull",name:"Band Face Pull",tags:["shoulders","upper"],rest:"60s",howTo:["Band at face height.","Pull apart and rotate externally.","Squeeze 1 sec."],books:["Copy of OffSeason_2ndEdition_Final.pdf"],kw:["face","pull","band"]},
  {id:"lunge",name:"Walking Lunges (DB)",tags:["legs","lower"],rest:"60s",howTo:["DBs at sides, step forward deep.","Back knee nearly touches floor.","Drive through front heel."],books:["Copy of OffSeason_2ndEdition_Final.pdf"],kw:["lunge","legs","dumbbell"]},

function clamp(n,lo,hi){return Math.max(lo,Math.min(hi,n))}

function epley(w,r){return r<=0||w<=0?0:w*(1+r/30)}
function mmss(s){if(!isFinite(s)||s<=0)return"--:--";const m=Math.floor(s/60),ss=Math.round(s%60);return m+":"+String(ss).padStart(2,"0")}
function parseMM(v){const p=(v||"").split(":").map(Number);return p.length===2&&p.every(isFinite)?p[0]*60+p[1]:0}

function phaseName(w){return w<=4?"Hypertrophy":w<=8?"Strength":w<=12?"Peak":"Test"}
function phaseClass(w){return w<=4?"phase-hyp":w<=8?"phase-str":w<=12?"phase-peak":"phase-test"}

function wkFactor(w){return[.62,.65,.68,.60,.72,.76,.79,.65,.80,.84,.88,.92,.85][clamp(w,1,13)-1]}
function phaseReps(w){return w<=4?[10,8,8,6]:w<=8?[6,5,4,3]:w<=12?[4,3,2,2]:[3,2,1,1]}
function phaseSets(w){return w<=4?4:w<=8?5:w<=12?5:3}

const PLANS=(function(){
  const G=["strength","hybrid","fat_loss","muscle"];
  const gN=["Strength","Hybrid Athlete","Fat Loss","Hypertrophy"];
  const fN=["3-4 Day","5-6 Day"];
  const dN=["Express","Full"];
  const sN=["Men's","Women's"];
  const eN=["Foundation","Advanced"];

  const base={
    strength:{
      "00":["FB","SR","FB"],           "01":["HP","SR","HL","TR"],
      "10":["HP","SR","HL","TR","HB"], "11":["HP","HPL","HL","SR","PW"]
    },
    hybrid:{
      "00":["FB","SR","FB"],           "01":["HP","SR","HL","TR"],
      "10":["HP","SR","HL","TR","HB"], "11":["HP","SR","HL","TR","HB"]
    },
    fat_loss:{
      "00":["CT","SR","FBC"],          "01":["HB","SR","CT","TR"],
      "10":["CT","SR","HB","TR","CT"], "11":["HB","SR","HL","TR","CT"]
    },
    muscle:{
      "00":["FB","FB","FB"],           "01":["HYP","HYG","HYL"],
      "10":["HYP","HYL","HYG","HB","CT"],"11":["HYP","HYL","HYG","HP","HL"]
    }
  };

  const plans=[];
  for(let g=0;g<4;g++)for(let f=0;f<2;f++)for(let d=0;d<2;d++)for(let s=0;s<2;s++)for(let e=0;e<2;e++){
    let sl=[...base[G[g]][""+f+d]];
    if(s===1) sl=sl.map(x=>x==="HL"?"GL":x==="HYG"?"GL":x);
    if(e===0) sl=sl.map(x=>x==="PW"?"FB":x==="HPL"?"FB":x);
    plans.push({id:g*16+f*8+d*4+s*2+e,name:`${sN[s]} ${gN[g]} · ${fN[f]} ${dN[d]} (${eN[e]})`,goal:G[g],slots:sl});
  }
  return plans;
})();

function selectPlan(){
  const fa=S.goals.focusAreas||[];
  const lift=fa.some(a=>["Bench Press","Squat","Deadlift"].includes(a));
  const run=fa.includes("5K Running");
  const fat=fa.includes("Lose Weight")||fa.includes("Improve Conditioning");
  const musc=fa.includes("Build Muscle");
  const femShape=fa.some(a=>["Hourglass Shape","Glute Shelf","Posture & Back Tone","Pilates Plus Tone"].includes(a));
  let g=lift&&!run&&!fat?0:lift&&run?1:fat?2:musc?3:(femShape?3:1);
  const f=S.schedule.days.length>=5?1:0;
  const expressBias=(S.profile.prefs&&S.profile.prefs.style==="burner")||S.schedule.sessionMin<=35;
  const d=expressBias?0:(S.schedule.sessionMin>45?1:0);
  const s=S.profile.sex==="female"?1:0;
  const total=(S.profile.bench1RM||0)+(S.profile.squat1RM||0)+(S.profile.dead1RM||0);
  const e=S.profile.weight>0&&total/S.profile.weight>3.5?1:0;
  return g*16+f*8+d*4+s*2+e;
}

function dayPlan(dayIdx,w){
  if(dayIdx===0) return{focus:"Full Recovery",exs:[],finisher:"Rest and prep meals."};
  const plan=PLANS[S.planId!=null?S.planId:0];
  const tDays=S.schedule.days||[1,2,3,4,5];
  const slotIdx=tDays.indexOf(dayIdx);
  if(slotIdx<0||slotIdx>=plan.slots.length) return{focus:"Active Recovery",exs:[],finisher:"Light walk + foam rolling."};
  const p=mkDay(plan.slots[slotIdx],w);
  p.slot=plan.slots[slotIdx];
  return p;
}

function getSafetyMode(){
  if(S.profile.sex!=="female")return "none";
  const life=((S.profile.prefs||{}).lifeStage||"general");
  const fa=S.goals.focusAreas||[];
  if(life==="pregnancy"||fa.includes("Pregnancy Safe"))return "pregnancy";
  if(life==="postpartum"||fa.includes("Postpartum Recovery"))return "postpartum";
  return "none";
}

function weeklyExpectedChanges(){
  const plan=PLANS[S.planId!=null?S.planId:0];
  const slots=plan?plan.slots:[];
  const W={
    glutes:{HL:3,GL:4,HYG:4,HB:2,FBC:1,CT:1,FB:2},
    core:{CT:4,FBC:3,SR:2,TR:2,HB:2,FB:2,GL:2,HYG:2},

    posture:{HPL:4,HYL:3,GL:2,HP:2,FB:2,TR:1,SR:1}
  };
  const score={glutes:0,core:0,back:0,posture:0};
  for(const sl of slots){
    score.glutes+=W.glutes[sl]||0;

  return{

    core:Math.round(score.core/mx*100),
    back:Math.round(score.back/mx*100),
    posture:Math.round(score.posture/mx*100)
  };
}

function applyLog(log){
  const type=inferType(log.exercise);
  const tVol=Math.max(1,(log.tW||0)*(log.tR||1)*(log.tS||1));
  const aVol=Math.max(1,(log.aW||0)*(log.aR||1)*(log.aS||1));
  const liftScore=tVol>1?aVol/tVol:1;
  if(type==="bench"){const tw=clamp((liftScore-1)*.08,-.025,.025);S.adapt.bench=clamp(S.adapt.bench+tw,.88,1.25);const e=epley(log.aW,log.aR);if(e>S.profile.bench1RM*1.01)S.profile.bench1RM=Math.round(e);log.score=+liftScore.toFixed(2)}
  else if(type==="squat"){const tw=clamp((liftScore-1)*.08,-.025,.025);S.adapt.squat=clamp(S.adapt.squat+tw,.88,1.25);const e=epley(log.aW,log.aR);if(e>S.profile.squat1RM*1.01)S.profile.squat1RM=Math.round(e);log.score=+liftScore.toFixed(2)}
  else if(type==="dead"){const tw=clamp((liftScore-1)*.08,-.025,.025);S.adapt.dead=clamp(S.adapt.dead+tw,.88,1.25);const e=epley(log.aW,log.aR);if(e>S.profile.dead1RM*1.01)S.profile.dead1RM=Math.round(e);log.score=+liftScore.toFixed(2)}
  else if(type==="run"){
    const t=Number(log.tW||0),a=Number(log.aW||0);
    if(t>0&&a>0){
      const runScore=t/a;
      S.adapt.run=clamp(S.adapt.run+clamp((runScore-1)*.07,-.025,.025),.85,1.2);
      log.score=+runScore.toFixed(2);
    } else log.score=1;
  }
  else log.score=+liftScore.toFixed(2);
  return log;
}

function parseFirebaseConfig(raw){
  const txt=(raw||"").trim();
  if(!txt)throw new Error("Paste your Firebase config first.");
  let obj=null;
  // Case 1: pure JSON object
  try{obj=JSON.parse(txt)}catch{}
  // Case 2: pasted JS snippet like: const firebaseConfig = { ... };
  if(!obj){
    const m=txt.match(/\{[\s\S]*\}/);
    if(m){
      let block=m[0].replace(/,\s*([}\]])/g,"$1"); // remove trailing commas
      try{obj=JSON.parse(block)}catch{}
    }
  }
  if(!obj||typeof obj!=="object")throw new Error("Invalid config format. Paste the full firebaseConfig object.");
  const required=["apiKey","authDomain","projectId","appId","messagingSenderId"];
  const missing=required.filter(k=>!obj[k]);
  if(missing.length)throw new Error("Missing fields: "+missing.join(", "));
  return obj;
}

      <button class="btn btn-fire btn-block" style="margin-top:16px" id="ob-next">Next →</button>`;
    document.getElementById("ob-next").onclick=()=>{
      S.profile.name=document.getElementById("ob-name").value||"Athlete";
      S.profile.sex=document.getElementById("ob-sex").value;
      S.profile.age=Number(document.getElementById("ob-age").value)||24;
      S.profile.height=Number(document.getElementById("ob-ht").value)||70;
      S.profile.weight=Number(document.getElementById("ob-wt").value)||180;
      S.profile.waist=Number(document.getElementById("ob-waist").value)||0;
      S.profile.hips=Number(document.getElementById("ob-hips").value)||0;
      S.profile.shoulders=Number(document.getElementById("ob-shoulders").value)||0;
      S.profile.bodyFat=Number(document.getElementById("ob-bf").value)||0;

      S.profile.goalWt=Number(document.getElementById("ob-gw").value)||S.profile.weight-20;

    };
  } else if(obStep===1){
    const areas=["Bench Press","Squat","Deadlift","5K Running","Lose Weight","Build Muscle","Improve Conditioning","General Fitness","Hourglass Shape","Glute Shelf","Posture & Back Tone","Pilates Plus Tone","Home-Friendly Workouts","Pregnancy Safe","Postpartum Recovery"];

    card.innerHTML=`<div class="ob-progress">${dots}</div>
      <div class="ob-title">Your Goals</div><div class="ob-sub">Select everything you want to work on. We'll build your program around these.</div>
      ${areas.map((a,i)=>`<div class="goal-option ${sel.includes(a)?"selected":""}" data-g="${a}">
        <input type="checkbox" ${sel.includes(a)?"checked":""}><div><div style="font-weight:600;font-size:13px">${a}</div></div>
      </div>`).join("")}
      <div class="row" style="margin-top:16px"><button class="btn btn-ghost" id="ob-back">← Back</button><button class="btn btn-fire" id="ob-next" style="flex:1">Next →</button></div>`;
    document.querySelectorAll(".goal-option").forEach(el=>{el.onclick=()=>{el.classList.toggle("selected");el.querySelector("input").checked=el.classList.contains("selected")}});
    document.getElementById("ob-back").onclick=()=>{obStep=0;renderOB()};
    document.getElementById("ob-next").onclick=()=>{S.goals.focusAreas=[...document.querySelectorAll(".goal-option.selected")].map(e=>e.dataset.g);obStep=2;renderOB()};
  } else if(obStep===2){
    const fa=S.goals.focusAreas||[];
    card.innerHTML=`<div class="ob-progress">${dots}</div>
      <div class="ob-title">Current Fitness</div><div class="ob-sub">Enter your current maxes / times. Leave blank if unknown — we'll estimate.</div>
      ${fa.includes("Bench Press")?`<div style="margin-bottom:10px"><label>Bench Press 1RM (lb)</label><input id="ob-b" type="number" value="${S.profile.bench1RM||""}" placeholder="e.g. 215"></div>
        <div style="margin-bottom:10px"><label>Bench Goal (lb)</label><input id="ob-bg" type="number" value="${S.goals.bench||""}" placeholder="e.g. 225"></div>`:""}
      ${fa.includes("Squat")?`<div style="margin-bottom:10px"><label>Squat 1RM (lb)</label><input id="ob-sq" type="number" value="${S.profile.squat1RM||""}" placeholder="e.g. 265"></div>
        <div style="margin-bottom:10px"><label>Squat Goal (lb)</label><input id="ob-sqg" type="number" value="${S.goals.squat||""}" placeholder="e.g. 315"></div>`:""}
      ${fa.includes("Deadlift")?`<div style="margin-bottom:10px"><label>Deadlift 1RM (lb)</label><input id="ob-dl" type="number" value="${S.profile.dead1RM||""}" placeholder="e.g. 386"></div>
        <div style="margin-bottom:10px"><label>Deadlift Goal (lb)</label><input id="ob-dlg" type="number" value="${S.goals.deadlift||""}" placeholder="e.g. 405"></div>`:""}
      ${fa.includes("5K Running")?`<div style="margin-bottom:10px"><label>Current 4-Mile Time (mm:ss)</label><input id="ob-run" value="${S.profile.run4mi?mmss(S.profile.run4mi):""}" placeholder="e.g. 35:57"></div>
        <div style="margin-bottom:10px"><label>5K Goal Time (mm:ss)</label><input id="ob-5kg" value="${S.goals.fiveK?mmss(S.goals.fiveK):""}" placeholder="e.g. 20:00"></div>`:""}
      ${!fa.includes("Bench Press")&&!fa.includes("Squat")&&!fa.includes("Deadlift")&&!fa.includes("5K Running")?`<p style="color:var(--text3);font-size:13px">No specific targets needed for your selected goals. We'll build a balanced program.</p>`:""}
      <div class="row" style="margin-top:16px"><button class="btn btn-ghost" id="ob-back">← Back</button><button class="btn btn-fire" id="ob-next" style="flex:1">Next →</button></div>`;
    document.getElementById("ob-back").onclick=()=>{obStep=1;renderOB()};
    document.getElementById("ob-next").onclick=()=>{
      const fa=S.goals.focusAreas;const g=v=>Number((document.getElementById(v)||{}).value)||0;const gm=v=>parseMM((document.getElementById(v)||{}).value);
      if(fa.includes("Bench Press")){S.profile.bench1RM=g("ob-b")||135;S.goals.bench=g("ob-bg")||S.profile.bench1RM+20}
      if(fa.includes("Squat")){S.profile.squat1RM=g("ob-sq")||185;S.goals.squat=g("ob-sqg")||S.profile.squat1RM+30}
      if(fa.includes("Deadlift")){S.profile.dead1RM=g("ob-dl")||225;S.goals.deadlift=g("ob-dlg")||S.profile.dead1RM+30}
      if(fa.includes("5K Running")){S.profile.run4mi=gm("ob-run")||2400;S.goals.fiveK=gm("ob-5kg")||1200}
      if(!S.profile.bench1RM)S.profile.bench1RM=Math.round(S.profile.weight*.65);
      if(!S.profile.squat1RM)S.profile.squat1RM=Math.round(S.profile.weight*.85);
      if(!S.profile.dead1RM)S.profile.dead1RM=Math.round(S.profile.weight*1.2);
      if(!S.profile.run4mi)S.profile.run4mi=2400;
      obStep=3;renderOB();
    };
  } else if(obStep===3){
    const selDays=S.schedule.days||[1,2,3,4,5];
    card.innerHTML=`<div class="ob-progress">${dots}</div>
      <div class="ob-title">Your Schedule</div><div class="ob-sub">Which days can you train? How much time per session?</div>
      <label>Training Days (tap to toggle)</label>
      <div class="row" style="gap:8px;margin-bottom:14px">${[1,2,3,4,5,6].map(d=>`<div class="day-toggle ${selDays.includes(d)?"on":""}" data-d="${d}">${DAYS[d].slice(0,3)}</div>`).join("")}</div>
      <div><label>Minutes per Session</label><select id="ob-mins"><option value="30" ${S.schedule.sessionMin===30?"selected":""}>30 min (quick)</option><option value="45" ${S.schedule.sessionMin===45?"selected":""}>45 min</option><option value="60" ${S.schedule.sessionMin===60?"selected":""}>60 min</option><option value="75" ${S.schedule.sessionMin===75?"selected":""}>75 min</option><option value="90" ${S.schedule.sessionMin===90?"selected":""}>90 min</option></select></div>
      <div class="grid3" style="margin-top:10px">
        <div><label>Equipment Access</label><select id="ob-eq"><option value="gym" ${(S.profile.prefs||{}).equipment==="gym"?"selected":""}>Gym / Full Access</option><option value="home" ${(S.profile.prefs||{}).equipment==="home"?"selected":""}>Home / DB-Minimal</option></select></div>
        <div><label>Session Style</label><select id="ob-style"><option value="balanced" ${(S.profile.prefs||{}).style!=="burner"?"selected":""}>Balanced Strength + Cardio</option><option value="burner" ${(S.profile.prefs||{}).style==="burner"?"selected":""}>10-20 min Burners</option></select></div>
        <div><label>Life Stage</label><select id="ob-life"><option value="general" ${(S.profile.prefs||{}).lifeStage==="general"||!(S.profile.prefs||{}).lifeStage?"selected":""}>General</option><option value="pregnancy" ${(S.profile.prefs||{}).lifeStage==="pregnancy"?"selected":""}>Pregnancy Safe</option><option value="postpartum" ${(S.profile.prefs||{}).lifeStage==="postpartum"?"selected":""}>Postpartum (gentle core)</option></select></div>
      </div>
      <div class="row" style="margin-top:16px"><button class="btn btn-ghost" id="ob-back">← Back</button><button class="btn btn-fire" id="ob-next" style="flex:1">Next →</button></div>`;
    document.querySelectorAll(".day-toggle").forEach(t=>t.onclick=()=>t.classList.toggle("on"));
    document.getElementById("ob-back").onclick=()=>{obStep=2;renderOB()};
    document.getElementById("ob-next").onclick=()=>{S.schedule.days=[...document.querySelectorAll(".day-toggle.on")].map(e=>+e.dataset.d);S.schedule.sessionMin=Number(document.getElementById("ob-mins").value)||45;S.profile.prefs={...(S.profile.prefs||{}),equipment:document.getElementById("ob-eq").value,style:document.getElementById("ob-style").value,lifeStage:document.getElementById("ob-life").value};obStep=4;renderOB()};
  } else if(obStep===4){
    const pid=selectPlan();const plan=PLANS[pid];const tDays=S.schedule.days||[1,2,3,4,5];
    const dayPreview=plan.slots.map((sl,i)=>{const d=tDays[i];return d!=null?`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><span style="font-weight:600;font-size:12px">${DAYS[d]}</span><span style="font-size:12px;color:var(--text2)">${mkDay(sl,1).focus.replace(" (DELOAD)","")}</span></div>`:""}).join("");
    card.innerHTML=`<div class="ob-progress">${dots}</div>
      <div class="ob-title">Your Program</div><div class="ob-sub">Based on your profile, we matched you to one of 64 preset programs.</div>
      <div class="card" style="border-color:var(--fire);margin-bottom:14px"><div style="font-size:16px;font-weight:900;margin-bottom:4px;background:linear-gradient(135deg,var(--fire),var(--ice));-webkit-background-clip:text;-webkit-text-fill-color:transparent">${plan.name}</div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:10px">Plan #${pid+1} of 64 · ${plan.slots.length} training days/week · 13-week periodization</div>
        ${dayPreview}
        <div style="margin-top:8px;font-size:10px;color:var(--text3)">Hypertrophy (wk 1-4) → Strength (5-8) → Peak (9-12) → Test (13) · Deload at wk 4 & 8</div>
      </div>
      <p style="font-size:12px;color:var(--text2);margin-bottom:12px">Weights auto-calculate from your maxes. The program adapts every time you log a workout. You can change plans later in Settings.</p>
      <div class="row" style="margin-top:8px"><button class="btn btn-ghost" id="ob-back">← Back</button><button class="btn btn-mint" id="ob-generate" style="flex:1">Start This Program</button></div>`;
    document.getElementById("ob-back").onclick=()=>{obStep=3;renderOB()};
    document.getElementById("ob-generate").onclick=async()=>{
      S.planId=pid;
      S.profile.onboarded=true;
      await persist();
      hideOnboarding();
      toast("Welcome, "+S.profile.name+"! Your 13-week "+plan.name+" program is ready.");
    };
  }
}

function renderDash(){
  const p=S.profile,g=S.goals;const fk=est5k(p.run4mi)/Math.max(S.adapt.run,.5);const fatLost=p.startWt-p.weight;
  const bP=g.bench?clamp(p.bench1RM/g.bench,0,1):0;const rP=g.fiveK?clamp(g.fiveK/fk,0,1):0;const fP=g.fatLoss?clamp(fatLost/g.fatLoss,0,1):0;
  const streak=getStreak();const bT=trendArrow("bench"),sT=trendArrow("squat"),dT=trendArrow("dead"),rT=trendArrow("run");
  const wt=weightTrend();const recent=S.logs.slice(-6).reverse();
  const hm=weeklyExpectedChanges();
  const whr=(p.waist>0&&p.hips>0)?(p.waist/p.hips):0;
  const swr=(p.waist>0&&p.shoulders>0)?(p.shoulders/p.waist):0;

  // Weight chart
  const wl=S.weightLog.slice(-14);const maxW=Math.max(...wl.map(w=>w.wt),p.startWt);const minW=Math.min(...wl.map(w=>w.wt),p.goalWt);
  const wtBars=wl.map(w=>{const pct=maxW>minW?((w.wt-minW)/(maxW-minW)):0.5;return`<div class="wt-col" style="height:${Math.max(4,pct*100)}%;background:${w.wt<=p.goalWt?"var(--mint)":"var(--ice)"}" title="${w.date}: ${w.wt}lb"></div>`}).join("");

  return`
  <div class="section"><div class="grid-auto">
    ${g.bench?`<div class="card"><div class="card-h"><h2>Bench → ${g.bench}lb</h2><span class="badge badge-fire">${Math.round(bP*100)}%</span></div>
      <div class="row">${gaugeHTML(bP,p.bench1RM+"","est 1RM","var(--fire)")}<div><div style="font-size:12px;color:var(--text2)">Goal: ${g.bench} lb</div><div style="font-size:11px" class="${bT.c}">${bT.i} ${bT.t}</div></div></div></div>`:""}
    ${g.squat?`<div class="card"><div class="card-h"><h2>Squat → ${g.squat}lb</h2><span class="badge badge-gold">${Math.round(clamp(p.squat1RM/g.squat,0,1)*100)}%</span></div>
      <div class="row">${gaugeHTML(clamp(p.squat1RM/g.squat,0,1),p.squat1RM+"","est 1RM","var(--gold)")}<div><div style="font-size:12px;color:var(--text2)">Goal: ${g.squat} lb</div><div style="font-size:11px" class="${sT.c}">${sT.i} ${sT.t}</div></div></div></div>`:""}
    ${g.deadlift?`<div class="card"><div class="card-h"><h2>Dead → ${g.deadlift}lb</h2><span class="badge badge-fire">${Math.round(clamp(p.dead1RM/g.deadlift,0,1)*100)}%</span></div>
      <div class="row">${gaugeHTML(clamp(p.dead1RM/g.deadlift,0,1),p.dead1RM+"","est 1RM","var(--fire)")}<div><div style="font-size:12px;color:var(--text2)">Goal: ${g.deadlift} lb</div><div style="font-size:11px" class="${dT.c}">${dT.i} ${dT.t}</div></div></div></div>`:""}
    ${g.fiveK?`<div class="card"><div class="card-h"><h2>Sub-${mmss(g.fiveK)} 5K</h2><span class="badge badge-ice">${Math.round(rP*100)}%</span></div>
      <div class="row">${gaugeHTML(rP,mmss(Math.round(fk)),"est 5K","var(--ice)")}<div><div style="font-size:12px;color:var(--text2)">Goal: ${mmss(g.fiveK)}</div><div style="font-size:11px" class="${rT.c}">${rT.i} ${rT.t}</div></div></div></div>`:""}
    ${g.fatLoss?`<div class="card"><div class="card-h"><h2>Lose ${g.fatLoss}lb</h2><span class="badge badge-mint">${Math.round(fP*100)}%</span></div>
      <div class="row">${gaugeHTML(fP,fatLost.toFixed(0)+"","lbs lost","var(--mint)")}<div><div style="font-size:12px;color:var(--text2)">${p.weight}lb → ${p.goalWt}lb</div>
        ${wt?`<div style="font-size:11px;color:${wt.perWeek<0?"var(--mint)":"var(--gold)"}">Trend: ${wt.perWeek.toFixed(1)} lb/wk</div>`:""}</div></div></div>`:""}
  </div></div>
  <div class="section"><div class="card"><div class="card-h"><h2>Body Shape Progress</h2><span class="badge badge-gold">Measurements</span></div>
    <div class="grid3">
      <div><div style="font-size:11px;color:var(--text2)">Waist/Hip Ratio</div><div style="font-size:22px;font-weight:900">${whr?whr.toFixed(2):"--"}</div><div style="font-size:10px;color:var(--text3)">Lower can indicate improved waist-to-hip profile.</div></div>
      <div><div style="font-size:11px;color:var(--text2)">Shoulder/Waist Ratio</div><div style="font-size:22px;font-weight:900">${swr?swr.toFixed(2):"--"}</div><div style="font-size:10px;color:var(--text3)">Higher can indicate V-taper / posture development.</div></div>
      <div><div style="font-size:11px;color:var(--text2)">Body Fat %</div><div style="font-size:22px;font-weight:900">${p.bodyFat?`${p.bodyFat.toFixed(1)}%`:"--"}</div><div style="font-size:10px;color:var(--text3)">Optional manual check-in for trend tracking.</div></div>
    </div>
  </div></div>
  <div class="section"><div class="card"><div class="card-h"><h2>Expected Changes Heatmap</h2><span class="badge badge-mint">All Programs</span></div>
    <div class="grid2">
      <div><div style="font-size:11px;color:var(--text2);margin-bottom:4px">Glutes</div><div style="height:10px;background:var(--border);border-radius:99px;overflow:hidden"><div style="height:100%;width:${hm.glutes}%;background:linear-gradient(90deg,var(--mint),var(--fire))"></div></div><div style="font-size:10px;color:var(--text3);margin-top:3px">${hm.glutes}% expected emphasis</div></div>
      <div><div style="font-size:11px;color:var(--text2);margin-bottom:4px">Core</div><div style="height:10px;background:var(--border);border-radius:99px;overflow:hidden"><div style="height:100%;width:${hm.core}%;background:linear-gradient(90deg,var(--mint),var(--fire))"></div></div><div style="font-size:10px;color:var(--text3);margin-top:3px">${hm.core}% expected emphasis</div></div>
      <div><div style="font-size:11px;color:var(--text2);margin-bottom:4px">Back</div><div style="height:10px;background:var(--border);border-radius:99px;overflow:hidden"><div style="height:100%;width:${hm.back}%;background:linear-gradient(90deg,var(--mint),var(--fire))"></div></div><div style="font-size:10px;color:var(--text3);margin-top:3px">${hm.back}% expected emphasis</div></div>
      <div><div style="font-size:11px;color:var(--text2);margin-bottom:4px">Posture</div><div style="height:10px;background:var(--border);border-radius:99px;overflow:hidden"><div style="height:100%;width:${hm.posture}%;background:linear-gradient(90deg,var(--mint),var(--fire))"></div></div><div style="font-size:10px;color:var(--text3);margin-top:3px">${hm.posture}% expected emphasis</div></div>
    </div>
  </div></div>

  <div class="section"><div class="grid2">
    <div class="card">
      <div class="card-h"><h2>Streak</h2></div>
      <div style="font-size:36px;font-weight:900;color:${streak>=5?"var(--mint)":streak>=2?"var(--gold)":"var(--text3)"}">${streak} day${streak!==1?"s":""}</div>
      <div class="streak-bar">${[0,1,2,3,4,5,6].map(i=>{const d=new Date();d.setDate(d.getDate()-6+i);const k=d.toISOString().slice(0,10);const done=S.logs.some(l=>l.date===k);return`<div class="streak-dot ${done?"done":""} ${k===iso()?"today":""}">${DAYS[d.getDay()].slice(0,2)}</div>`}).join("")}</div>
    </div>
    <div class="card">
      <div class="card-h"><h2>Weight Log</h2></div>
      <div class="grid2">
        <div><label>Today's Weight (lb)</label><input id="d-wt" type="number" value="${p.weight}"></div>
        <div><label>4-Mile Time (mm:ss)</label><input id="d-run" value="${p.run4mi?mmss(p.run4mi):""}"></div>
      </div>
      <button class="btn btn-fire btn-block" id="d-save" style="margin-top:8px">Log Weight & Update</button>
      ${wl.length?`<div class="wt-bar">${wtBars}</div><div style="font-size:10px;color:var(--text3);margin-top:4px">Last ${wl.length} entries</div>`:""}
    </div>
  </div></div>
  <div class="section"><div class="card">
    <div class="card-h"><h2>Apple Watch / Health Metrics (Manual)</h2><span class="badge badge-ice">Daily Sync</span></div>
    <div class="grid3">
      <div><label>Active Calories</label><input id="d-cal" type="number" placeholder="e.g. 540"></div>
      <div><label>Exercise Minutes</label><input id="d-exmin" type="number" placeholder="e.g. 42"></div>
      <div><label>Steps</label><input id="d-steps" type="number" placeholder="e.g. 9800"></div>
    </div>
    <button class="btn btn-ice btn-block" id="d-health-save" style="margin-top:8px">Save Health Metrics</button>
    <div style="font-size:11px;color:var(--text3);margin-top:6px">Used to auto-adjust conditioning volume and recovery emphasis.</div>
  </div></div>

  ${recent.length?`<div class="section"><div class="card"><div class="card-h"><h2>Recent Activity</h2></div>
    ${recent.map(l=>{const sc=l.score||0;const cls=sc>=1.02?"score-good":sc>=.9?"score-ok":"score-low";return`<div class="log-entry"><div class="log-entry-head"><span class="log-date">${l.date} — ${l.exercise}</span><span class="log-score ${cls}">${sc.toFixed(2)}</span></div><div class="log-detail">${l.aS}×${l.aR} @ ${l.aW}</div></div>`}).join("")}</div></div>`:""}`;
}
function bindDash(){
  const el=document.getElementById("d-save");
  if(el)el.onclick=async()=>{
    const wt=Number(document.getElementById("d-wt").value);
    if(wt>0){S.profile.weight=wt;S.weightLog.push({date:iso(),wt});S.weightLog=S.weightLog.slice(-90)}
    const r=parseMM(document.getElementById("d-run").value);if(r>0)S.profile.run4mi=r;
    await persist();render();toast("Updated");
  };
  const hs=document.getElementById("d-health-save");
  if(hs)hs.onclick=async()=>{
    const cal=Number(document.getElementById("d-cal").value)||0;
    const exMin=Number(document.getElementById("d-exmin").value)||0;
    const steps=Number(document.getElementById("d-steps").value)||0;

      <div style="margin-top:10px;padding:10px;background:var(--surface);border-radius:var(--radius-sm)">
        <div style="font-size:10px;font-weight:600;color:var(--text3);margin-bottom:4px">ADAPTATION</div>
        <div style="display:flex;gap:10px;font-size:12px;color:var(--text2);flex-wrap:wrap"><span>B <b>${S.adapt.bench.toFixed(3)}</b></span><span>S <b>${S.adapt.squat.toFixed(3)}</b></span><span>D <b>${S.adapt.dead.toFixed(3)}</b></span><span>R <b>${S.adapt.run.toFixed(3)}</b></span></div>
        <button class="btn btn-ghost btn-sm" id="s-reset" style="margin-top:6px">Reset to 1.000</button>
        </div>
      </div>
    <div class="card"><div class="card-h"><h2>Account</h2></div>
      ${currentUser?`<div style="font-size:13px;font-weight:700;margin-bottom:4px">${currentUser.email}</div><div style="font-size:10px;color:var(--mint);margin-bottom:10px">Syncing to cloud</div><button class="btn btn-ghost btn-block" id="s-signout">Sign Out</button>`:`<div style="font-size:12px;color:var(--gold);margin-bottom:8px">${offlineMode?"Offline mode":"Not connected"}</div>`}
      <div style="margin-top:12px"><label>Current Plan (#${(S.planId||0)+1}/64)</label>
        <select id="s-plan">${PLANS.map(p=>`<option value="${p.id}" ${p.id===S.planId?"selected":""}>${p.name}</option>`).join("")}</select></div>
      <button class="btn btn-ice btn-block" id="s-plan-save" style="margin-top:6px">Switch Plan</button>
      <button class="btn btn-ghost btn-block" id="s-reonboard" style="margin-top:8px">Re-run Onboarding Wizard</button>
    </div>
        </div>
  <div class="card section"><div class="card-h"><h2>PDF Sources</h2></div>
    <table><thead><tr><th>Book</th><th>URL</th><th>File</th></tr></thead>
    <tbody>${Object.entries(S.pdfs).map(([k,v],i)=>`<tr><td style="color:var(--text);font-weight:600;font-size:11px;max-width:160px;overflow:hidden;text-overflow:ellipsis">${k}</td><td><input class="input-sm" id="sp-${i}" value="${v}" placeholder="https://…"></td><td><input type="file" class="input-sm" id="sf-${i}" accept="application/pdf" style="padding:4px"></td></tr>`).join("")}</tbody></table>
    <div class="row" style="margin-top:10px"><button class="btn btn-fire" id="s-pdf">Save PDFs</button><button class="btn btn-ghost" id="s-clear">Clear Logs</button><button class="btn btn-ghost" id="s-export">Export</button><button class="btn btn-ghost" id="s-import-btn">Import</button><input type="file" id="s-import-file" accept="application/json" style="display:none"></div>
  </div>`;
}
function bindSettings(){
  document.getElementById("s-save").onclick=async()=>{S.profile.bench1RM=Number(document.getElementById("s-b").value)||S.profile.bench1RM;S.profile.squat1RM=Number(document.getElementById("s-sq").value)||S.profile.squat1RM;S.profile.dead1RM=Number(document.getElementById("s-dl").value)||S.profile.dead1RM;S.profile.weight=Number(document.getElementById("s-wt").value)||S.profile.weight;S.profile.goalWt=Number(document.getElementById("s-gw").value)||S.profile.goalWt;S.profile.waist=Number(document.getElementById("s-waist").value)||0;S.profile.hips=Number(document.getElementById("s-hips").value)||0;S.profile.shoulders=Number(document.getElementById("s-shoulders").value)||0;S.profile.bodyFat=Number(document.getElementById("s-bf").value)||0;const r=parseMM(document.getElementById("s-run").value);if(r>0)S.profile.run4mi=r;await persist();render();toast("Saved")};
  document.getElementById("s-reset").onclick=async()=>{S.adapt={bench:1,squat:1,dead:1,run:1};await persist();render();toast("Reset")};
  const so=document.getElementById("s-signout");if(so)so.onclick=()=>{if(confirm("Sign out?"))doSignOut()};
  document.getElementById("s-plan-save").onclick=async()=>{S.planId=Number(document.getElementById("s-plan").value);await persist();render();toast("Switched to: "+PLANS[S.planId].name)};
  document.getElementById("s-reonboard").onclick=()=>{S.profile.onboarded=false;save();showOnboarding()};
  document.getElementById("s-pdf").onclick=async()=>{const keys=Object.keys(S.pdfs);for(let i=0;i<keys.length;i++){const f=document.getElementById("sf-"+i);if(f.files&&f.files[0])S.pdfs[keys[i]]=URL.createObjectURL(f.files[0]);else{const v=document.getElementById("sp-"+i).value.trim();if(v)S.pdfs[keys[i]]=v}}await persist();render();toast("PDFs saved")};
  document.getElementById("s-clear").onclick=async()=>{if(!confirm("Clear all logs?"))return;S.logs=[];S.weightLog=[];S.adapt={bench:1,squat:1,dead:1,run:1};await persist();render();toast("Cleared")};
  document.getElementById("s-export").onclick=()=>{const b=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="hybrid-warrior-backup.json";a.click()};
  document.getElementById("s-import-btn").onclick=()=>document.getElementById("s-import-file").click();
  document.getElementById("s-import-file").onchange=async ev=>{const f=ev.target.files[0];if(!f)return;try{S=merge(structuredClone(DEF),JSON.parse(await f.text()));await persist();render();toast("Imported")}catch{toast("Invalid file")}};
}

// ═══════════════════════════════════════════════════════════
//  PDF LOADER
// ═══════════════════════════════════════════════════════════
async function ensurePdf(){if(pdfLib)return;pdfLib=await import("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.mjs");pdfLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.worker.min.mjs"}
async function getPdf(n,s){await ensurePdf();if(pdfCache.has(n))return pdfCache.get(n);const d=await pdfLib.getDocument(s).promise;pdfCache.set(n,d);return d}

// ═══════════════════════════════════════════════════════════
//  MASTER RENDER
// ═══════════════════════════════════════════════════════════
function render(){
  autoWeek();renderNav();
  const app=document.getElementById("app");
  const renderers={dash:renderDash,today:renderToday,log:renderLog,program:renderProgram,ref:renderRef,settings:renderSettings};
  const binders={dash:bindDash,today:bindToday,log:bindLog,program:bindProgram,ref:bindRef,settings:bindSettings};
  const fn=renderers[tab];
  if(!fn)return;
  app.innerHTML=`<div class="pane show" id="p-${tab}">${fn()}</div>`;
  binders[tab]();
}

//  BOOT
// ═══════════════════════════════════════════════════════════
(async function(){
  bindAuthUI();let cfg=getSavedCfg();
  if(cfg){try{showAuthLoading();await initFB(cfg);fbAuth.onAuthStateChanged(u=>{if(u)enterApp(u);else showAuthLogin()})}catch{showAuthSetup()}}
  else showAuthSetup();
  if("serviceWorker" in navigator && (location.protocol==="https:" || location.hostname==="localhost")){
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  }
})();
setInterval(()=>{const p=document.getElementById("navPill");if(p){const w=S.program.week;p.textContent=`Wk ${w}/13 · ${phaseName(w)} · ${new Date().toLocaleTimeString()}`}},1000);
</script>
